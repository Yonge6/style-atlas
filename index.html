<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Style Atlas｜风格图鉴</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button id="backBtn" class="icon-btn hidden" type="button" aria-label="Back">‹</button>
      <div class="brand">
        <strong>Style Atlas</strong>
        <span>风格图鉴</span>
      </div>
      <div class="top-actions">
        <button id="searchOpenBtn" class="icon-btn" type="button" aria-label="Search">⌕</button>
        <button id="langBtn" class="lang-toggle" type="button">EN｜中文</button>
        <button id="drawerBtn" class="icon-btn" type="button" aria-label="Menu">☰</button>
      </div>
    </header>

    <main>
      <section id="homeView" class="view active" aria-label="Today">
        <div class="section-head">
          <p id="todayLabel">今日风格</p>
          <button id="randomBtn" class="small-action" type="button">随机</button>
        </div>
        <p id="positioningCopy" class="positioning-copy">一本装进口袋里的视觉风格图鉴。每天 3 分钟认识一种风格，建立自己的审美词库。</p>

        <div id="deckStage" class="deck-stage" aria-live="polite">
          <article id="prevGhost" class="style-card cover-card ghost-card prev" aria-hidden="true"></article>
          <article id="nextGhost" class="style-card cover-card ghost-card next" aria-hidden="true"></article>
          <article id="styleDeck" class="style-card cover-card live-card" tabindex="0"></article>
        </div>

        <div class="deck-controls">
          <button id="prevBtn" class="arrow-btn" type="button">←</button>
          <span id="swipeHint">左右滑动探索</span>
          <button id="nextBtn" class="arrow-btn" type="button">→</button>
        </div>

        <section class="category-strip" aria-label="Categories">
          <h2 id="categoryTitle">分类</h2>
          <div id="categoryChips" class="category-cards"></div>
        </section>
      </section>

      <section id="detailView" class="view" aria-label="Style detail">
        <article id="detailContent" class="detail"></article>
      </section>

      <section id="searchView" class="view" aria-label="Search">
        <div class="search-panel">
          <label for="searchInput" id="searchLabel">搜索风格</label>
          <div class="search-box">
            <input id="searchInput" autocomplete="off" placeholder="瑞士、Ukiyo-e、海报、复古..." />
            <button id="clearSearchBtn" type="button">×</button>
          </div>
          <div id="filterChips" class="chip-row filters"></div>
        </div>
        <div id="searchResults" class="result-list"></div>
      </section>

      <section id="savedView" class="view" aria-label="Saved">
        <div class="saved-head">
          <p id="savedCount">已收藏 0 个风格</p>
          <button id="copyListBtn" class="small-action" type="button">复制清单</button>
        </div>
        <div id="savedList" class="result-list"></div>
      </section>
    </main>

    <div id="drawerBackdrop" class="drawer-backdrop" hidden></div>
    <aside id="drawer" class="drawer" aria-label="Navigation" aria-hidden="true">
      <div class="drawer-head">
        <strong>Style Atlas</strong>
        <button id="drawerCloseBtn" class="icon-btn" type="button" aria-label="Close">×</button>
      </div>
      <nav class="drawer-nav">
        <button class="nav-btn active" type="button" data-view="home">今日</button>
        <button class="nav-btn" type="button" data-view="detail">探索</button>
        <button class="nav-btn" type="button" data-view="search">搜索</button>
        <button class="nav-btn" type="button" data-view="saved">收藏</button>
        <button class="nav-btn plus-nav" type="button" data-action="show-plus">Style Atlas Plus</button>
      </nav>
    </aside>
  </div>

  <div id="toast" class="toast" role="status"></div>
  <div id="plusModal" class="plus-modal" hidden>
    <div class="plus-panel" role="dialog" aria-modal="true" aria-labelledby="plusTitle">
      <button class="lightbox-close" type="button" data-action="close-plus">×</button>
      <p id="plusKicker" class="plus-kicker">Style Atlas Plus</p>
      <h2 id="plusTitle">Style Atlas Plus</h2>
      <p id="plusSubtitle" class="plus-subtitle">建立你的私人审美资料库。</p>
      <ul id="plusBenefits" class="plus-benefits"></ul>
      <div class="plus-price">
        <span id="plusLaunchPrice">首发限时 ¥28 / $3.99</span>
        <small id="plusRegularPrice">正式价 ¥48 / $7.99</small>
      </div>
      <button id="plusCta" class="copy-btn plus-cta" type="button" disabled>即将开放</button>
    </div>
  </div>
  <div id="lightbox" class="lightbox" hidden>
    <button class="lightbox-close" type="button" data-action="close-lightbox">×</button>
    <img id="lightboxImage" alt="" />
    <div class="lightbox-actions">
      <button class="copy-btn" type="button" data-action="save-lightbox">保存</button>
      <button class="copy-btn" type="button" data-action="share-lightbox">分享</button>
    </div>
  </div>
  <script src="./data-core.js"></script>
  <script src="./data-styles.js"></script>
  <script src="./data-refined.js"></script>
  <script src="./examples.js"></script>
  <script src="./game.js"></script>
</body>
</html>
